name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    env:
      NEXTAUTH_SECRET: ci-test-secret-ci-test-secret-1234
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck app
        run: npx tsc --noEmit

      - name: Typecheck tests
        run: npx tsc --noEmit -p tsconfig.vitest.json

      - name: Test
        # No MONGODB_URI is set here on purpose: tests/global-setup.ts only
        # spins up mongodb-memory-server (a real replica set, so the
        # transactional integration tests run for real) when MONGODB_URI
        # isn't already present in the environment.
        run: npm test

      - name: Build
        # next build's module graph touches src/lib/env.ts at import time
        # (see api-handler.ts -> mongoose.ts -> env.ts), so it needs a
        # syntactically valid MONGODB_URI even though it never connects
        # during the build itself.
        env:
          MONGODB_URI: mongodb://localhost:27017/seasharp-build
        run: npm run build
