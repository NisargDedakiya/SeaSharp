name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: seasharp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AUTH_JWT_SECRET: ci-test-secret-ci-test-secret-1234
      APP_URL: http://localhost:3000
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/seasharp
      APP_DATABASE_URL: postgres://app_user:app_user_dev_password@localhost:5432/seasharp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck app
        run: npx tsc --noEmit

      - name: Typecheck tests
        run: npx tsc --noEmit -p tsconfig.vitest.json

      - name: Migrate + bootstrap database
        run: |
          npm run db:migrate
          npm run db:bootstrap

      - name: Test
        # tests/global-setup.ts creates and migrates its own disposable
        # "seasharp_test" database on this same Postgres service container,
        # so the suite's truncation never touches the dev-shaped DB above.
        run: npm test

      - name: Build
        run: npm run build
