services:
  mongo:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      # First call fails (not yet initiated) and initiates the replica set;
      # every call after that succeeds once initiation completes. This is
      # how the app gets multi-document transactions (used for RFQ award and
      # escrow release) without a separate one-shot init container.
      test: >
        mongosh --port 27017 --quiet --eval
        "try { rs.status().ok } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }"
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  app:
    build: .
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongo:27017/seasharp?replicaSet=rs0
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set a long random secret in .env}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: production
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongo_data:
