services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: seasharp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  migrate:
    build:
      context: .
      # The final "runner" stage only ships the minimal Next.js standalone
      # output — no devDependencies, no drizzle/ or scripts/ folders. The
      # "builder" stage has the full source tree and node_modules needed to
      # run drizzle-kit and the bootstrap script.
      target: builder
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/seasharp
      APP_DATABASE_URL: postgres://app_user:app_user_dev_password@postgres:5432/seasharp
    # One-shot job: applies Drizzle table migrations, then the hand-written
    # RLS/roles bootstrap (see docs/04-database-design.md#row-level-security).
    # `app` waits for this to exit 0 before starting.
    command: sh -c "npm run db:migrate && npm run db:bootstrap"

  app:
    build: .
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/seasharp
      APP_DATABASE_URL: postgres://app_user:app_user_dev_password@postgres:5432/seasharp
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?set a long random secret in .env}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NODE_ENV: production
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
